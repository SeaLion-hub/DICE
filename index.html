<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DICE — 놓치지 마세요, 중요한 기회를</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#2563eb; /* blue-600 */
      --primary-700:#1d4ed8; /* blue-700 */
      --text:#0b1220;
      --muted:#556070;
      --bg-start:#f3f7ff;
      --bg-end:#e9f0ff;
      --radius:14px;
      --shadow:0 10px 25px rgba(20, 40, 120, 0.12);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg-start),var(--bg-end));
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    }

    /* Header */
    .header{
      width:100%;
      max-width:1100px;
      margin:0 auto;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:0.2px}
    .brand svg{width:26px;height:26px}
    .brand .name{font-weight:800;font-size:22px}

    .login-btn{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:10px 18px;
      border-radius:12px;
      font-weight:700;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:.18s ease-in-out;
    }
    .login-btn:hover{background:var(--primary-700); transform:translateY(-1px)}

    /* Main */
    .hero{
      display:grid;
      place-items:center;
      text-align:center;
      padding:56px 20px 72px;
    }
    .card{
      background:#fff;
      width:72px;height:72px;
      display:grid;place-items:center;
      border-radius:20px;
      box-shadow:var(--shadow);
      margin-bottom:28px;
    }
    .title{
      font-size: clamp(28px, 5vw, 56px);
      font-weight:900;
      line-height:1.15;
      letter-spacing:-0.4px;
      margin:0 0 18px;
    }
    .title .accent{color:var(--primary)}

    .desc{
      font-size: clamp(16px, 2.2vw, 22px);
      color:#2d3a4d;
      opacity:0.92;
      line-height:1.7;
      max-width:880px;
      margin:0 auto 28px;
    }

    .cta{
      background:var(--primary);
      color:#fff;
      font-weight:800;
      font-size:18px;
      padding:16px 32px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:.2s ease-in-out;
    }
    .cta:hover{background:var(--primary-700); transform:translateY(-1px)}

    /* Footer (optional) */
    .footer{color:#73809a;font-size:12px;text-align:center;padding:24px}

    /* Responsive tweaks */
    @media (min-width: 960px){ .hero{padding-top:84px; padding-bottom:96px} }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header" role="banner">
    <div class="brand" aria-label="DICE 브랜드">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="2.5" y="4" width="14" height="14" rx="4" ry="4" />
        <circle cx="8" cy="10" r="1.5" fill="#fff"/>
        <circle cx="13" cy="7.5" r="1.5" fill="#fff"/>
        <circle cx="13" cy="12.5" r="1.5" fill="#fff"/>
      </svg>
      <span class="name">DICE</span>
    </div>
    <button class="login-btn" aria-label="로그인" onclick="goToLogin()">로그인</button>
  </header>

  <!-- Main Hero -->
  <main class="hero">
    <div class="card" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor">
        <rect x="2.5" y="4" width="14" height="14" rx="4" ry="4" />
        <circle cx="8" cy="10" r="1.5" fill="#fff"/>
        <circle cx="13" cy="7.5" r="1.5" fill="#fff"/>
        <circle cx="13" cy="12.5" r="1.5" fill="#fff"/>
      </svg>
    </div>
    <h1 class="title">
      놓치지 마세요,<br/>
      <span class="accent">중요한 기회를</span>
    </h1>
    <p class="desc">
      대학의 모든 공지사항을 한 곳에서 확인하고, AI가 맞춤형으로 추천해드립니다.
      장학금, 인턴십, 공모전 등 중요한 기회를 절대 놓치지 마세요.
    </p>
    <button class="cta" aria-label="시작하기" onclick="goToLogin()">시작하기</button>
  </main>

  <footer class="footer">© <span id="y"></span> DICE</footer>

  <script>
    // 연도 자동 표기
    document.getElementById('y').textContent = new Date().getFullYear();
    
    // 로그인 페이지로 이동
    function goToLogin() {
      window.location.href = 'auth.html';
    }
  </script>
</body>
</html>
